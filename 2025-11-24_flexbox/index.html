<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Übung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Flexbox</h2>
            <p>Karte 1: display: flex mit wrap, justify-content, align-items</p>
        </div>
        <div class="card">
            <h2>Gap</h2>
            <p>Karte 2: gap: 1.5rem für gleichmäßige Abstände</p>
        </div>
        <div class="card">
            <h2>Direction</h2>
            <p>Karte 3: flex-direction: column für vertikale Anordnung</p>
        </div>
        <div class="card">
            <h2>Hover</h2>
            <p>Karte 4: transition für soften Effekte</p>
        </div>
    </div>
</body>
</html>
